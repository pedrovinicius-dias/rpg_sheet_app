name: dnd_sheet_app
description: Gerenciador de fichas de D&D 5e — offline, multiplataforma.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Banco de dados local
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0

  # Gerenciamento de estado
  flutter_riverpod: ^2.5.1

  # Imagens
  image_picker: ^1.1.2
  path_provider: ^2.1.3

  # UI
  google_fonts: ^6.2.1

  # Utilitários
  uuid: ^4.4.2
  shared_preferences: ^2.3.1
  intl: ^0.19.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
